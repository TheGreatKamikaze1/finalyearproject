<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Course</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <div class="container">
    <header>
      <div>
        <a href="index.html">&larr; Back</a>
        <div class="smallmuted" id="headerMe"></div>
      </div>
      <div class="toolbar">
        <button id="logoutBtn" class="hidden">Logout</button>
      </div>
    </header>

    <main>
      <section class="card">
        <p class="eyebrow-text">Course workspace</p>
        <h1 id="courseTitle" style="margin-top:0;"></h1>
        <p id="courseDesc" class="smallmuted"></p>
        <div class="toolbar">
          <span id="courseCode" class="badge"></span>
          <span id="coursePublished" class="badge"></span>
        </div>
      </section>

      <section>
        <div class="section-heading">
          <div>
            <p class="eyebrow-text">Accessible content</p>
            <h2>Materials</h2>
          </div>
        </div>
        <div id="materialsWrap" class="material-list" aria-live="polite"></div>
      </section>
    </main>
  </div>

  <script src="assets/config.js"></script>
  <script src="assets/app.js"></script>
  <script>
    (async () => {
      await requireLogin();
      await renderHeader();
      await loadAccessibility();

      const params = new URLSearchParams(window.location.search);
      const id = params.get("id");
      if (!id){ alert("Missing course id"); window.location.href = "index.html"; return; }

      try{
        await loadCoursePage(id);
      }catch(e){
        alert(e.message);
        window.location.href = "index.html";
      }
    })();
  </script>
</body>
</html>
