<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Course</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body class="app-body">
  <div class="app-shell">
    <header class="app-header">
      <a class="brand" href="index.html">
        <span class="brand-mark">A</span>
        <span>AccessLearn</span>
      </a>
      <nav class="main-nav" aria-label="Primary navigation">
        <a href="index.html">Dashboard</a>
        <a href="index.html#my-learning">My learning</a>
        <a href="index.html#catalog">Courses</a>
        <a href="index.html#accessibility">Accessibility</a>
      </nav>
      <div class="toolbar" aria-label="User actions">
        <span id="headerMe" class="smallmuted"></span>
        <button id="logoutBtn" class="hidden" type="button">Logout</button>
      </div>
    </header>

    <main>
      <section class="card">
        <p class="eyebrow-text">Course workspace</p>
        <h1 id="courseTitle" style="margin-top:0;"></h1>
        <p id="courseDesc" class="smallmuted"></p>
        <div class="toolbar">
          <span id="courseCode" class="badge"></span>
          <span id="coursePublished" class="badge"></span>
        </div>
      </section>

      <section>
        <div class="section-heading">
          <div>
            <p class="eyebrow-text">Accessible content</p>
            <h2>Course materials</h2>
          </div>
        </div>
        <div id="materialsWrap" class="material-list" aria-live="polite"></div>
      </section>
    </main>
  </div>

  <script src="assets/config.js"></script>
  <script src="assets/app.js"></script>
  <script>
    (async () => {
      if (!await requireLogin()) return;
      await renderHeader();
      await loadAccessibility();

      const params = new URLSearchParams(window.location.search);
      const id = params.get("id");
      if (!id){ alert("Missing course id"); window.location.href = "index.html"; return; }

      try{
        await loadCoursePage(id);
      }catch(e){
        alert(e.message);
        window.location.href = "index.html";
      }
    })();
  </script>
</body>
</html>
