<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login | Accessible E-Learning</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body class="auth-body">
  <main class="auth-shell">
    <section class="auth-visual" aria-label="Accessible E-Learning">
      <div class="auth-brand">
        <span class="brand-mark">A</span>
        <span>Accessible E-Learning</span>
      </div>
      <img class="auth-illustration" src="assets/auth-visual.svg" alt="" />
      <div class="auth-copy">
        <p class="eyebrow">Learning portal</p>
        <h1>Welcome back</h1>
        <p>Resume your courses, saved materials, and progress from a quieter workspace.</p>
      </div>
    </section>

    <section class="auth-panel" aria-labelledby="loginTitle">
      <h2 id="loginTitle">Sign in</h2>
      <p class="auth-lede">Use your account email and password.</p>

      <form id="form" class="auth-form" aria-label="Login form">
        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="text" inputmode="email" required autocomplete="email" placeholder="you@example.com" />
        </div>

        <div class="field">
          <label for="password">Password</label>
          <div class="password-field">
            <input id="password" type="password" required autocomplete="current-password" />
            <button type="button" class="password-toggle" data-toggle-password aria-controls="password" aria-pressed="false">Show</button>
          </div>
        </div>

        <button id="submitBtn" class="auth-submit" type="submit">Sign in</button>
        <p id="status" class="auth-status smallmuted" aria-live="polite"></p>
      </form>

      <p class="auth-switch">New here? <a href="register.html">Create an account</a></p>
    </section>
  </main>

  <script src="assets/config.js"></script>
  <script src="assets/app.js"></script>
  <script>
    document.querySelector("#form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const status = document.querySelector("#status");
      const submitBtn = document.querySelector("#submitBtn");
      try{
        submitBtn.disabled = true;
        setStatus(status, "Signing in...");
        const data = await api("/auth/login", {
          method: "POST",
          auth: false,
          body: {
            email: document.querySelector("#email").value.trim(),
            password: document.querySelector("#password").value
          }
        });
        setToken(data.access_token);
        await loadAccessibility();
        redirectForRole(await getMe());
      }catch(err){
        setStatus(status, err.message, true);
      }finally{
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
