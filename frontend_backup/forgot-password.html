<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset password | AccessLearn</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <main class="auth-shell">
    <section class="auth-intro" aria-label="Password help">
      <a class="brand" href="login.html" aria-label="AccessLearn home">
        <span class="brand-mark" aria-hidden="true">AL</span>
        <span>AccessLearn</span>
      </a>
      <div class="intro-copy">
        <p class="eyebrow">Account recovery</p>
        <h1>Get back in calmly.</h1>
        <p>Password reset delivery is the next backend milestone. For now, this page gives the project a complete auth journey surface.</p>
      </div>
    </section>

    <section class="auth-panel" aria-labelledby="reset-title">
      <div class="auth-card">
        <p class="eyebrow">Reset password</p>
        <h1 id="reset-title">Request a reset link</h1>
        <form id="resetForm">
          <div class="mb-3">
            <label class="form-label" for="email">Email address</label>
            <input class="form-control" id="email" type="email" autocomplete="email" required>
          </div>
          <button class="btn btn-primary w-100" type="submit">Send reset link</button>
          <p data-status class="status" role="status" aria-live="polite"></p>
        </form>
        <p class="mt-4 mb-0"><a href="login.html">Return to sign in</a></p>
      </div>
    </section>
  </main>

  <script src="assets/config.js"></script>
  <script src="assets/app.js"></script>
  <script>
    document.getElementById("resetForm").addEventListener("submit", (event) => {
      event.preventDefault();
      setStatus("Reset emails are not connected yet. Ask an administrator to reset your password.", "success");
    });
  </script>
</body>
</html>
